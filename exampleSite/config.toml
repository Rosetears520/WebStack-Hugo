baseURL               = "https://tools.rosetears.cn/"
languageCode          = "zh-CN"
title                 = "泪花花工具导航"
theme                 = "WebStack-Hugo"
preserveTaxonomyNames = true
disablePathToLower    = true
hasCJKLanguage        = true
publishDir            = "public"				# 站点静态文件保存目录


[params]
    author        = "rosetears"
    description   = "泪花花的工具导航"
    upload        = "https://rosetears.cn/recommend-mail.html"      # 左侧导航栏的"网站提交"
    about         = "https://tools.rosetears.cn/about/"	          # 左侧导航栏的"关于导航"页面(./about)
    repository    = ""
    enablePreLoad = true					# 网站完全打开前预加载动画
    textPreLoad   = "泪花花工具导航"				# 预加载的动画文字, 只有当enablePreLoad=true时生效
    expandSidebar = false					# 默认展开左侧边导航栏
    logosPath     = "assets/images/logos"			# 网站每个导航地址logo存放地址
    defaultLogo   = "assets/images/logos/default.webp"		# logo图片资源不存在或者错误时, 默认显示的logo; 该参数如为空,将会一直加载对应的logo,直至成功
    nightMode     = false					# 默认站点为深色(夜间)模式
    yiyan         = true                         		# 默认启用一言服务
    fancybox      = true                                        # 使用 Fancybox 实现图片灯箱/放大功能

[params.seo]    
    baiduhmid       = ''	# 百度统计 hm.src 的 ID
    baiduSiteVer    = ''			# 百度HTML标签验证(baidu-site-verification)
    tj51laid        = ''                        		# 51.LA 网站统计
    tj51lack        = ''
    GoogleAdsClient = ''					# Google AdSense 

[params.qweather]
    key = ""

[params.images]
    favicon           = "https://rosetears.cn/favicon.ico"
    searchImageL      = "assets/images/bg-dna.jpg"		# 搜索部分浅色背景图
    searchImageD      = "assets/images/bg-dna.jpg"		# 搜索部分深色背景图
    logoExpandLight   = "https://rosetears.cn/favicon.ico"
    logoExpandDark    = "https://rosetears.cn/favicon.ico"
    logoCollapseLight = "https://rosetears.cn/favicon.ico"
    logoCollapseDark  = "https://rosetears.cn/favicon.ico"
    
[markup.goldmark.renderer]
    unsafe = true

[params.footer]
    copyright = '本站内容源自互联网，如有内容侵犯了你的权益，请联系删除相关内容。<br/>&copy; 2025-2026 By [泪花花](https://rosetears.cn/) | [工具导航](https://tools.rosetears.cn/) | [豫ICP备2025110466号-1](https://beian.miit.gov.cn/)<br/>'
